<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060608" />

    <!-- ============ Performance: start the 3D model + its Draco decoder ============
         Fetch these in parallel with the JS bundle (instead of waiting until the
         bundle has parsed and executed), so the figure appears as soon as possible.
         Same-origin requests → no `crossorigin`. The "/yesh.portfolio/" prefix is the
         Vite `base`; if you change `base` in vite.config.js, update these three too. -->
    <link rel="preload" href="/yesh.portfolio/assets/model/torso.glb" as="fetch" type="model/gltf-binary" crossorigin="anonymous" />
    <link rel="preload" href="/yesh.portfolio/draco/draco_wasm_wrapper.js" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/yesh.portfolio/draco/draco_decoder.wasm" as="fetch" type="application/wasm" crossorigin="anonymous" />

    <!-- ============ SEO ============ -->
    <title>Yeshwant Singh | AI Project Coordinator</title>
    <meta
      name="description"
      content="Portfolio of Yeshwant Singh, AI Project Coordinator in Melbourne working across AI operations, multilingual data projects, machine learning, automation, and cloud-based systems."
    />
    <meta name="author" content="Yeshwant Singh" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://singhyeshwant.github.io/yesh.portfolio/" />

    <!-- ============ Open Graph ============ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Yeshwant Singh | AI Project Coordinator" />
    <meta
      property="og:description"
      content="AI operations, multilingual data projects, machine learning, automation and cloud-based systems — Melbourne, Australia."
    />
    <!-- Replace with your deployed absolute URL once live -->
    <meta property="og:image" content="https://singhyeshwant.github.io/yesh.portfolio/assets/og/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ============ Twitter ============ -->

    <meta name="twitter:title" content="Yeshwant Singh | AI Project Coordinator" />
    <meta
      name="twitter:description"
      content="AI operations, multilingual data projects, machine learning, automation and cloud-based systems — Melbourne, Australia."
    />
    <meta name="twitter:image" content="https://singhyeshwant.github.io/yesh.portfolio/assets/og/og-image.jpg" />

    <!-- ============ Fonts (Syne / Manrope / JetBrains Mono) ============ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
